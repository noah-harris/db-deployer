services:
  db:
    container_name: db
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "${EXTERNAL_PORT}:${INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d postgres -h ${HOST} -p ${INTERNAL_PORT}"]
      interval: 5s
      retries: 5

  initializer:
    container_name: initializer
    stop_grace_period: 5m
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      HOST: ${HOST}
      INTERNAL_PORT: ${INTERNAL_PORT}
      EXTERNAL_PORT: ${EXTERNAL_PORT}
      DIALECT: ${DIALECT}
      RESTORE_POINT_INTERVAL_MINUTES: ${RESTORE_POINT_INTERVAL_MINUTES}
      RESTORE_POINT_RETENTION: ${RESTORE_POINT_RETENTION}
      
    volumes:
      - restore:/app/restore
      - sql-scripts:/app/sql-scripts

volumes:
  restore:
    driver: local
    driver_opts:
      type: ${TYPE}
      device: "${RESTORE_POINT_DIRECTORY}"
      o: ${O}

  sql-scripts:
    driver: local
    driver_opts:
      type: ${TYPE}
      device: "${SQL_PROJECT_DIRECTORY}"
      o: ${O}