services:
  db:
    container_name: db
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${EXTERNAL_PORT}:${INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" -b -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  initializer:
    container_name: initializer
    stop_grace_period: 5m
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      HOST: ${HOST}
      INTERNAL_PORT: ${INTERNAL_PORT}
      EXTERNAL_PORT: ${EXTERNAL_PORT}
      DIALECT: ${DIALECT}
      RESTORE_POINT_INTERVAL_MINUTES: ${RESTORE_POINT_INTERVAL_MINUTES}
      RESTORE_POINT_RETENTION: ${RESTORE_POINT_RETENTION}
      
    volumes:
      - restore:/app/restore
      - sql-scripts:/app/sql-scripts

volumes:
  restore:
    driver: local
    driver_opts:
      type: ${TYPE}
      device: "${RESTORE_POINT_DIRECTORY}"
      o: ${O}

  sql-scripts:
    driver: local
    driver_opts:
      type: ${TYPE}
      device: "${SQL_PROJECT_DIRECTORY}"
      o: ${O}